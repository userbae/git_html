<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 성적표</title>
</head>
<body>
    <table border="1" width="500">
        <caption><h1>학생 성적표</h1></caption>
        
        <thead>
            <tr><!-- 첫번째 줄 -->
                <th rowspan="2">이름</th>
                <th colspan="3">과목별 점수</th>
                <th rowspan="2">평균</th>
            </tr>
            <tr ><!-- 두번째 줄 -->
                <th>국어</th>
                <th>영어</th>
                <th>수학</th>
            </tr>
        </thead>
        
        <tr >
            <td>김도현</td>
            <td>85</td>
            <td>92</td>
            <td>78</td>
            <td>85.0</td>
        </tr>

        <tr>
            <td>이서연</td>
            <td>90</td>
            <td>88</td>
            <td>95</td>
            <td>91.0</td>
        </tr>

    </table>
</body>
</html>
