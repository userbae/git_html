<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>표만들기</title>
</head>
<body>
    <h2>행렬의 수가 다른 표만들기</h2>
    <pre>
        colspan속성 : 칸 합치기
        rowspan속성 : 줄 합치기
    </pre>

    <table border="1">
        <tr>
            <td>AAAA</td>
            <td>BBBB</td>
            <td colspan="2">CCCC</td>
            <td rowspan="3">DDDD</td>
        </tr>

        <tr>
            <td colspan="2">EEEE</td>
            <td rowspan="3">FFFF</td>
            <td>GGGG</td>
        </tr>

        <tr>
            <td>HHHH</td>
            <td>IIII</td>
            <td>JJJJ</td>
        </tr>

        <tr>
            <td>1111</td>
            <td>2222</td>
            <td>3333</td>
            <td>4444</td>
        </tr>
    </table>
</body>
</html>
