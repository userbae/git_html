<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월간 매출 보고서</title>
</head>
<body>
    <table border="1" width="80%">
        <caption><h1>2025년 3월 부서별 ㆍ 제품별 매출 보고서</h1></caption>
        
        <thead>
            <tr><!-- 첫번째 줄 -->
                <th rowspan="2">부서</th>
                <th rowspan="2">제품군</th>
                <th colspan="4">과목별 점수</th>
                <th rowspan="2">평균</th>
                <th rowspan="2">증감률</th>
            </tr>
            <tr><!-- 두번째 줄 -->
                <th>1주차</th>
                <th>2주차</th>
                <th>3주차</th>
                <th>4주차</th>
            </tr>
        </thead>
            <tr> <!-- 영업 1팀 -->
                <td rowspan="3">영업1팀</td>
                <td>가전</td>
                <td>120</td>
                <td>140</td>
                <td>130</td>
                <td>150</td>
                <td>540</td>
                <td>+12%</td>
            </tr>

            <tr>
                <td>컴퓨터</td>
                <td>80</td>
                <td>95</td>
                <td>100</td>
                <td>110</td>
                <td>385</td>
                <td>-3%</td>
            </tr>

            <tr>
                <td>생활용품</td>
                <td>60</td>
                <td>70</td>
                <td>75</td>
                <td>65</td>
                <td>270</td>
                <td>+5%</td>
            </tr>
        

            <tr> <!-- 영업 2팀 -->
                <td rowspan="2">영업2팀</td>
                <td>식품</td>
                <td>150</td>
                <td>160</td>
                <td>170</td>
                <td>180</td>
                <td>660</td>
                <td>+8%</td>
            </tr>

            <tr>
                <td>의류</td>
                <td>90</td>
                <td>85</td>
                <td>95</td>
                <td>100</td>
                <td>370</td>
                <td>-1%</td>
            </tr>

            <tr>
                <td colspan="2">전체 합계</td>
                <td>550</td>
                <td>550</td>
                <td>570</td>
                <td>605</td>
                <td>2,225</td>
                <td>+4%</td>
            </tr>
        
    </table>
</body>
</html>
